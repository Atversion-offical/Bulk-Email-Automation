<!DOCTYPE html>
<html>

<head>

    <title>Email Campaign Automation</title>

    <style>
        * {
            box-sizing: border-box;
        }


        body {

            margin: 0;

            min-height: 100vh;

            font-family:
                "Segoe UI",
                Arial,
                sans-serif;

            background: #f4f6f8;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;

        }


        /* CARD */

        .container {

            width: 100%;

            max-width: 420px;

            background: white;

            border-radius: 16px;

            padding: 32px;

            border: 1px solid #e5e7eb;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.08);

        }



        /* HEADER */

        .logo {

            width: 55px;

            height: 55px;

            margin: 0 auto 15px;

            display: flex;

            align-items: center;

            justify-content: center;

            border-radius: 12px;

            background: #f1f5f9;

            color: #2563eb;

            font-size: 26px;

        }


        h2 {

            text-align: center;

            margin: 0;

            color: #111827;

            font-size: 24px;

            font-weight: 600;

        }


        .subtitle {

            text-align: center;

            margin: 10px 0 28px;

            color: #6b7280;

            font-size: 14px;

        }



        /* FORM */

        .form-group {

            margin-bottom: 18px;

        }



        label {

            display: block;

            margin-bottom: 7px;

            font-size: 14px;

            font-weight: 500;

            color: #374151;

        }



        input {

            width: 100%;

            height: 44px;

            padding: 0 12px;

            border-radius: 8px;

            border: 1px solid #d1d5db;

            font-size: 14px;

            outline: none;

            color: #111827;

        }



        input:focus {

            border-color: #2563eb;

            box-shadow:

                0 0 0 3px rgba(37, 99, 235, .12);

        }



        /* FILE */

        .file-box {

            padding: 14px;

            background: #f8fafc;

            border: 1px dashed #cbd5e1;

            border-radius: 10px;

        }



        .file-box input {

            border: none;

            height: auto;

            padding: 0;

        }



        .file-box input::file-selector-button {

            background: #2563eb;

            color: white;

            border: none;

            padding: 8px 14px;

            border-radius: 7px;

            cursor: pointer;

            margin-right: 10px;

        }



        /* BUTTON */

        button {

            width: 100%;

            height: 46px;

            border: none;

            border-radius: 8px;

            background: #2563eb;

            color: white;

            font-size: 15px;

            font-weight: 600;

            cursor: pointer;

            margin-top: 5px;

        }



        button:hover {

            background: #1d4ed8;

        }



        /* FOOTER */

        .footer {

            text-align: center;

            margin-top: 22px;

            color: #9ca3af;

            font-size: 12px;

        }



        /* LOADING */

        #loading {

            display: none;

            text-align: center;

            color: #374151;

        }



        .spinner {

            width: 45px;

            height: 45px;

            margin: 25px auto;

            border-radius: 50%;

            border:

                4px solid #e5e7eb;

            border-top:

                4px solid #2563eb;

            animation: spin 1s linear infinite;

        }


        @keyframes spin {

            100% {

                transform: rotate(360deg);

            }

        }



        /* SUCCESS */

        .success {

            display: none;

            text-align: center;

            color: #16a34a;

        }



        .success-icon {

            width: 55px;

            height: 55px;

            margin: auto;

            border-radius: 50%;

            background: #dcfce7;

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 28px;

        }



        @media(max-width:500px) {

            .container {

                padding: 25px;

            }

        }

        /* CHECKBOX */

        .checkbox-container {

            display: flex;

            align-items: center;

            gap: 8px;

            cursor: pointer;

        }


        .checkbox-container input {

            width: auto;

            height: auto;

            cursor: pointer;

        }
    </style>

</head>


<body>



    <div class="container">


        <div id="formBox">



            <div class="logo">

                ✉

            </div>


            <h2>

                Email Campaign

            </h2>


            <p class="subtitle">

                Upload your customer list and start automated email sending

            </p>




            <form id="campaignForm">



                <div class="form-group">


                    <label>

                        Upload Excel File

                    </label>


                    <div class="file-box">


                        <input type="file" name="excel_file" accept=".xlsx,.xls" required>


                    </div>


                </div>





                <div class="form-group">


                    <label>

                        Report Email

                    </label>


                    <input type="email" name="report_email" placeholder="Enter report email" required>


                </div>





                <div class="form-group">


                    <label>

                        Batch Size

                    </label>


                    <input type="number" name="batch_size" value="50" required>


                </div>





                <div class="form-group">


                    <label>

                        Wait Time (Seconds)

                    </label>


                    <input type="number" name="wait_time" value="60" required>


                </div>




                <div class="form-group">


                    <label class="checkbox-container">


                        <input type="checkbox" id="scheduleCheck" name="schedule_campaign">


                        Schedule Campaign


                    </label>


                </div>





                <div class="form-group" id="scheduleBox" style="display:none;">


                    <label>

                        Schedule Date & Time

                    </label>


                    <input type="datetime-local" id="scheduleTime" name="schedule_time">


                </div>




                <button>

                    Start Campaign

                </button>



            </form>




            <div class="footer">

                Powered by Atversion Automation

            </div>



        </div>







        <div id="loading">


            <h2>

                Campaign Running

            </h2>


            <p>

                Sending emails...

            </p>


            <div class="spinner"></div>


            <p>

                Please keep this page open

            </p>



        </div>







        <div id="success" class="success">


            <div class="success-icon">

                ✓

            </div>


            <h2>

                Completed

            </h2>


            <p>

                All emails sent successfully

            </p>



        </div>





    </div>








    <script>


        // Schedule Checkbox Logic

        const scheduleCheck =
            document.getElementById("scheduleCheck");


        const scheduleBox =
            document.getElementById("scheduleBox");


        const scheduleTime =
            document.getElementById("scheduleTime");



        scheduleCheck.addEventListener(
            "change",
            function () {


                if (this.checked) {


                    scheduleBox.style.display = "block";


                    scheduleTime.required = true;


                }

                else {


                    scheduleBox.style.display = "none";


                    scheduleTime.required = false;


                    scheduleTime.value = "";


                }


            });





        // Form Submit

        const form =
            document.getElementById("campaignForm");



        form.addEventListener(
            "submit",
            async (e) => {


                e.preventDefault();




                let data =
                    new FormData(form);





                document.getElementById("formBox")
                    .style.display = "none";



                document.getElementById("loading")
                    .style.display = "block";





                let response =
                    await fetch(

                        "https://automation.atversion.com/webhook-test/email-campaign",

                        {

                            method: "POST",

                            body: data

                        }

                    );






                if (response.ok) {


                    alert("Workflow started successfully");


                }

                else {


                    alert("Workflow failed to start");


                    return;


                }






                let timer =
                    setInterval(async () => {



                        let statusResponse =
                            await fetch(

                                "https://automation.atversion.com/webhook-test/campaign-status"

                            );





                        let result =
                            await statusResponse.json();






                        if (result.status == "completed") {


                            clearInterval(timer);




                            document.getElementById("loading")
                                .style.display = "none";



                            document.getElementById("success")
                                .style.display = "block";


                        }



                    }, 5000);



            });



    </script>



</body>

</html>
